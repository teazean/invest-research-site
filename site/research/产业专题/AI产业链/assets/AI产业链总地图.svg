<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="960" viewBox="0 0 1500 960">
  <rect width="1500" height="960" fill="#f7f8fb"/>
  <text x="70" y="78" font-size="38" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-weight="700" fill="#172033">AI产业链总地图</text>
  <text x="70" y="118" font-size="20" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" fill="#536074">从“算力机器”到“可付费应用”的投资阅读路径，数据日期：2026-07-03</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#48617f"/>
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #cfd7e6; stroke-width: 2; rx: 12; }
      .title { font: 700 23px Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #172033; }
      .body { font: 18px Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #3c4658; }
      .small { font: 15px Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #6a7588; }
      .tag { font: 700 15px Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #ffffff; }
    </style>
  </defs>

  <rect x="70" y="180" width="255" height="160" class="box"/>
  <rect x="90" y="200" width="92" height="30" rx="15" fill="#516d9c"/>
  <text x="112" y="221" class="tag">上游</text>
  <text x="95" y="262" class="title">AI芯片 / HBM</text>
  <text x="95" y="296" class="body">GPU、ASIC、HBM</text>
  <text x="95" y="324" class="body">先进封装、晶圆代工</text>

  <rect x="385" y="180" width="255" height="160" class="box"/>
  <rect x="405" y="200" width="92" height="30" rx="15" fill="#697d4c"/>
  <text x="427" y="221" class="tag">设备</text>
  <text x="410" y="262" class="title">服务器 / 网络</text>
  <text x="410" y="296" class="body">AI服务器、交换机</text>
  <text x="410" y="324" class="body">光模块、机柜集成</text>

  <rect x="700" y="180" width="255" height="160" class="box"/>
  <rect x="720" y="200" width="108" height="30" rx="15" fill="#9b6b43"/>
  <text x="743" y="221" class="tag">基础设施</text>
  <text x="725" y="262" class="title">数据中心 / 电力</text>
  <text x="725" y="296" class="body">土地、并网、电源</text>
  <text x="725" y="324" class="body">液冷、UPS、变压器</text>

  <rect x="1015" y="180" width="255" height="160" class="box"/>
  <rect x="1035" y="200" width="92" height="30" rx="15" fill="#b75f55"/>
  <text x="1057" y="221" class="tag">平台</text>
  <text x="1040" y="262" class="title">AI云 / 大模型</text>
  <text x="1040" y="296" class="body">训练、推理、API</text>
  <text x="1040" y="324" class="body">模型订阅、企业平台</text>

  <line x1="325" y1="260" x2="385" y2="260" stroke="#48617f" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="640" y1="260" x2="700" y2="260" stroke="#48617f" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="955" y1="260" x2="1015" y2="260" stroke="#48617f" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="195" y="470" width="300" height="155" class="box"/>
  <rect x="215" y="490" width="108" height="30" rx="15" fill="#7f5da8"/>
  <text x="238" y="511" class="tag">中间层</text>
  <text x="220" y="552" class="title">数据 / 工具 / MLOps</text>
  <text x="220" y="586" class="body">向量数据库、数据治理</text>
  <text x="220" y="614" class="body">评测、部署、监控、安全</text>

  <rect x="600" y="470" width="300" height="155" class="box"/>
  <rect x="620" y="490" width="92" height="30" rx="15" fill="#3d8880"/>
  <text x="642" y="511" class="tag">应用</text>
  <text x="625" y="552" class="title">AI应用 / Agent</text>
  <text x="625" y="586" class="body">办公、客服、编程</text>
  <text x="625" y="614" class="body">营销、金融、工业场景</text>

  <rect x="1005" y="470" width="300" height="155" class="box"/>
  <rect x="1025" y="490" width="92" height="30" rx="15" fill="#6b7fbe"/>
  <text x="1047" y="511" class="tag">终端</text>
  <text x="1030" y="552" class="title">端侧AI / 机器人</text>
  <text x="1030" y="586" class="body">AI PC、手机、眼镜</text>
  <text x="1030" y="614" class="body">自动驾驶、具身智能</text>

  <line x1="1143" y1="340" x2="750" y2="470" stroke="#48617f" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="900" y1="548" x2="1005" y2="548" stroke="#48617f" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="495" y1="548" x2="600" y2="548" stroke="#48617f" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="70" y="720" width="1360" height="185" rx="14" fill="#eef3f8" stroke="#cfd7e6" stroke-width="2"/>
  <text x="105" y="770" class="title">投资阅读顺序</text>
  <text x="105" y="812" class="body">1. 先看钱从哪里来：云厂商、模型公司、NeoCloud 和主权AI的资本开支。</text>
  <text x="105" y="846" class="body">2. 再看瓶颈在哪里：HBM、先进封装、网络、电力接入、液冷和机柜功率密度。</text>
  <text x="105" y="880" class="body">3. 最后看钱能不能回来：模型和应用是否能把推理成本转成持续收入。</text>
</svg>
