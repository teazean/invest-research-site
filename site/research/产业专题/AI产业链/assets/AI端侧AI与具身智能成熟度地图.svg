<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960">
  <rect width="1600" height="960" fill="#f7f7f2"/>
  <text x="80" y="72" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#202124">AI端侧AI与具身智能成熟度地图</text>
  <text x="80" y="112" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#5f6368">越靠左越接近成熟硬件出货，越靠右越接近早期物理世界期权；投资上要分层看确定性和弹性。</text>

  <line x1="150" y1="780" x2="1450" y2="780" stroke="#3c4043" stroke-width="3"/>
  <polygon points="1450,780 1428,768 1428,792" fill="#3c4043"/>
  <text x="145" y="826" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#3c4043">成熟出货</text>
  <text x="704" y="826" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#3c4043">商业化验证</text>
  <text x="1290" y="826" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#3c4043">技术期权</text>

  <rect x="90" y="160" width="410" height="520" rx="18" fill="#ffffff" stroke="#c8d7c4" stroke-width="3"/>
  <rect x="595" y="160" width="410" height="520" rx="18" fill="#ffffff" stroke="#c8d8ea" stroke-width="3"/>
  <rect x="1100" y="160" width="410" height="520" rx="18" fill="#ffffff" stroke="#e3c8c8" stroke-width="3"/>

  <text x="130" y="214" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#1f5130">端侧设备层</text>
  <text x="130" y="252" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#3c4043">手机、PC、可穿戴</text>
  <text x="130" y="296" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#202124">投资问题</text>
  <text x="130" y="330" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#3c4043">• 是否带动换机和ASP提升</text>
  <text x="130" y="362" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#3c4043">• NPU和内存是否变成刚需</text>
  <text x="130" y="394" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#3c4043">• 本地AI功能是否高频使用</text>
  <text x="130" y="448" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#202124">当前判断</text>
  <text x="130" y="482" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#3c4043">硬件和渠道成熟，确定性较高；</text>
  <text x="130" y="514" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#3c4043">AI体验和独立收费仍需验证。</text>
  <rect x="130" y="565" width="310" height="54" rx="10" fill="#e7f3e4"/>
  <text x="285" y="599" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#1f5130">高成熟度 / 中等弹性</text>

  <text x="635" y="214" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#174d78">车端与工业边缘</text>
  <text x="635" y="252" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#3c4043">智能汽车、工业视觉、机器人</text>
  <text x="635" y="296" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#202124">投资问题</text>
  <text x="635" y="330" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#3c4043">• 是否能形成软件订阅</text>
  <text x="635" y="362" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#3c4043">• 是否能降低事故和停机</text>
  <text x="635" y="394" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#3c4043">• 场景能否标准化复制</text>
  <text x="635" y="448" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#202124">当前判断</text>
  <text x="635" y="482" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#3c4043">商业化更近，但安全、监管、</text>
  <text x="635" y="514" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#3c4043">责任边界和项目交付要求更重。</text>
  <rect x="635" y="565" width="310" height="54" rx="10" fill="#e7f0f8"/>
  <text x="790" y="599" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#174d78">中高成熟度 / 中高弹性</text>

  <text x="1140" y="214" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#8a3030">具身智能与人形</text>
  <text x="1140" y="252" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#3c4043">模型、仿真、执行器、整机</text>
  <text x="1140" y="296" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#202124">投资问题</text>
  <text x="1140" y="330" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#3c4043">• 真实场景运行是否稳定</text>
  <text x="1140" y="362" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#3c4043">• BOM和维护成本能否下降</text>
  <text x="1140" y="394" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#3c4043">• 客户是否能算出回本周期</text>
  <text x="1140" y="448" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#202124">当前判断</text>
  <text x="1140" y="482" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#3c4043">想象空间大，但多数仍是技术期权；</text>
  <text x="1140" y="514" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#3c4043">不能把演示视频等同于收入兑现。</text>
  <rect x="1140" y="565" width="310" height="54" rx="10" fill="#f8e7e5"/>
  <text x="1295" y="599" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#8a3030">低成熟度 / 高弹性</text>

  <path d="M500 420 C555 420 555 420 595 420" stroke="#7a7d80" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M1005 420 C1060 420 1060 420 1100 420" stroke="#7a7d80" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <rect x="160" y="710" width="260" height="58" rx="12" fill="#dcebd8"/>
  <text x="290" y="747" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#1f5130">AI手机 / AI PC</text>
  <rect x="668" y="710" width="260" height="58" rx="12" fill="#dce9f5"/>
  <text x="798" y="747" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#174d78">车端 / 工业边缘</text>
  <rect x="1178" y="710" width="260" height="58" rx="12" fill="#f3dedb"/>
  <text x="1308" y="747" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#8a3030">人形 / 通用机器人</text>

  <text x="80" y="888" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#5f6368">读图方法：短期看端侧出货和车端付费，中期看工业场景复制，长期看人形机器人能否从样机走到真实工位。</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7a7d80"/>
    </marker>
  </defs>
</svg>
