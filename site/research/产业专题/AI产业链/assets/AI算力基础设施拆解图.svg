<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="940" viewBox="0 0 1500 940">
  <rect width="1500" height="940" fill="#f7fbfa"/>
  <text x="70" y="78" font-size="38" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-weight="700" fill="#172033">AI算力基础设施拆解图</text>
  <text x="70" y="118" font-size="20" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" fill="#536074">从模型需求到可用算力，中间每一层都可能成为瓶颈</text>
  <defs>
    <marker id="arrow3" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#47736f"/>
    </marker>
    <style>
      .box { fill: #fff; stroke: #c9dcd8; stroke-width: 2; rx: 12; }
      .title { font: 700 22px Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #172033; }
      .body { font: 17px Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #3b4654; }
      .small { font: 15px Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #6b7480; }
    </style>
  </defs>

  <rect x="70" y="185" width="220" height="145" class="box"/>
  <text x="100" y="235" class="title">模型需求</text>
  <text x="100" y="270" class="body">训练更大模型</text>
  <text x="100" y="300" class="body">推理更多请求</text>

  <rect x="360" y="185" width="220" height="145" class="box"/>
  <text x="390" y="235" class="title">AI芯片</text>
  <text x="390" y="270" class="body">GPU / ASIC</text>
  <text x="390" y="300" class="small">决定单卡算力</text>

  <rect x="650" y="185" width="220" height="145" class="box"/>
  <text x="680" y="235" class="title">HBM内存</text>
  <text x="680" y="270" class="body">高带宽显存</text>
  <text x="680" y="300" class="small">决定喂数据速度</text>

  <rect x="940" y="185" width="220" height="145" class="box"/>
  <text x="970" y="235" class="title">先进封装</text>
  <text x="970" y="270" class="body">CoWoS等</text>
  <text x="970" y="300" class="small">把芯片和HBM连接好</text>

  <rect x="1210" y="185" width="220" height="145" class="box"/>
  <text x="1240" y="235" class="title">AI服务器</text>
  <text x="1240" y="270" class="body">整机、机柜</text>
  <text x="1240" y="300" class="small">把零件变成设备</text>

  <line x1="290" y1="258" x2="360" y2="258" stroke="#47736f" stroke-width="3" marker-end="url(#arrow3)"/>
  <line x1="580" y1="258" x2="650" y2="258" stroke="#47736f" stroke-width="3" marker-end="url(#arrow3)"/>
  <line x1="870" y1="258" x2="940" y2="258" stroke="#47736f" stroke-width="3" marker-end="url(#arrow3)"/>
  <line x1="1160" y1="258" x2="1210" y2="258" stroke="#47736f" stroke-width="3" marker-end="url(#arrow3)"/>

  <rect x="210" y="480" width="280" height="150" class="box"/>
  <text x="240" y="530" class="title">高速网络</text>
  <text x="240" y="565" class="body">交换机、网卡、光模块</text>
  <text x="240" y="595" class="small">让很多机器像一台机器工作</text>

  <rect x="610" y="480" width="280" height="150" class="box"/>
  <text x="640" y="530" class="title">数据中心</text>
  <text x="640" y="565" class="body">电力、散热、机房</text>
  <text x="640" y="595" class="small">没有电和冷却，算力无法上线</text>

  <rect x="1010" y="480" width="280" height="150" class="box"/>
  <text x="1040" y="530" class="title">云服务</text>
  <text x="1040" y="565" class="body">租给模型与企业客户</text>
  <text x="1040" y="595" class="small">最终要靠利用率和价格回本</text>

  <line x1="1320" y1="330" x2="350" y2="480" stroke="#47736f" stroke-width="3" marker-end="url(#arrow3)"/>
  <line x1="490" y1="555" x2="610" y2="555" stroke="#47736f" stroke-width="3" marker-end="url(#arrow3)"/>
  <line x1="890" y1="555" x2="1010" y2="555" stroke="#47736f" stroke-width="3" marker-end="url(#arrow3)"/>

  <rect x="70" y="760" width="1360" height="100" rx="14" fill="#eaf3f1" stroke="#c9dcd8" stroke-width="2"/>
  <text x="105" y="810" class="body">底层逻辑：AI不是只买GPU。GPU要搭配HBM和封装，服务器要靠网络连起来，机房还要电力和散热。</text>
  <text x="105" y="842" class="body">所以投资不能只问“谁做芯片”，还要问“下一处约束在哪里、谁能因为约束拿到价格和订单”。</text>
</svg>
