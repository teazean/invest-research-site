<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1184" viewBox="0 0 1900 1184">
<defs><style>
          .title{font:700 45px 'Hiragino Sans GB','Arial Unicode MS',sans-serif;fill:#172033}
          .sub{font:500 21px 'Hiragino Sans GB','Arial Unicode MS',sans-serif;fill:#475569;text-anchor:middle}
          .head{font:700 23px 'Hiragino Sans GB','Arial Unicode MS',sans-serif;fill:#172033;text-anchor:middle}
          .cell{font:600 20px 'Hiragino Sans GB','Arial Unicode MS',sans-serif;fill:#172033;text-anchor:middle}
        </style></defs>
<rect width="1900" height="1184" fill="#f8fafc"/>
<text x="950.0" y="65" class="title" text-anchor="middle">光伏八条子链：节点规模、金额代理与口径边界</text>
<text x="950.0" y="110" class="sub">不同单位回答不同问题，跨节点金额不能直接相加。更新：2026-07-15</text>
<rect x="40" y="145" width="350" height="65" rx="6" fill="#cbd5e1"/>
<text x="215.0" y="187" class="head">子产业链</text>
<rect x="400" y="145" width="500" height="65" rx="6" fill="#cbd5e1"/>
<text x="650.0" y="187" class="head">规模锚</text>
<rect x="910" y="145" width="300" height="65" rx="6" fill="#cbd5e1"/>
<text x="1060.0" y="187" class="head">金额/公司代理</text>
<rect x="1220" y="145" width="650" height="65" rx="6" fill="#cbd5e1"/>
<text x="1545.0" y="187" class="head">正确读法</text>
<rect x="40" y="220" width="350" height="100" rx="6" fill="#e0f2fe" stroke="#94a3b8"/>
<text x="215.0" y="262" class="cell"><tspan x="215.0" dy="0">工业硅/多晶硅</tspan></text>
<rect x="400" y="220" width="500" height="100" rx="6" fill="#dcfce7" stroke="#94a3b8"/>
<text x="650.0" y="262" class="cell"><tspan x="650.0" dy="0">2025多晶硅约134万吨</tspan></text>
<rect x="910" y="220" width="300" height="100" rx="6" fill="#fef3c7" stroke="#94a3b8"/>
<text x="1060.0" y="262" class="cell"><tspan x="1060.0" dy="0">现价重估约415-442亿元</tspan></text>
<rect x="1220" y="220" width="650" height="100" rx="6" fill="#fae8ff" stroke="#94a3b8"/>
<text x="1545.0" y="262" class="cell"><tspan x="1545.0" dy="0">原料量；不能与下游收入相加</tspan></text>
<rect x="40" y="328" width="350" height="100" rx="6" fill="#e0f2fe" stroke="#94a3b8"/>
<text x="215.0" y="370" class="cell"><tspan x="215.0" dy="0">硅片/切片</tspan></text>
<rect x="400" y="328" width="500" height="100" rx="6" fill="#dcfce7" stroke="#94a3b8"/>
<text x="650.0" y="370" class="cell"><tspan x="650.0" dy="0">2025硅片约680GW</tspan></text>
<rect x="910" y="328" width="300" height="100" rx="6" fill="#fef3c7" stroke="#94a3b8"/>
<text x="1060.0" y="370" class="cell"><tspan x="1060.0" dy="0">TCL硅片收入122.38亿元</tspan></text>
<rect x="1220" y="328" width="650" height="100" rx="6" fill="#fae8ff" stroke="#94a3b8"/>
<text x="1545.0" y="370" class="cell"><tspan x="1545.0" dy="0">制造量；规格不同不硬折算片价</tspan></text>
<rect x="40" y="436" width="350" height="100" rx="6" fill="#e0f2fe" stroke="#94a3b8"/>
<text x="215.0" y="478" class="cell"><tspan x="215.0" dy="0">电池片</tspan></text>
<rect x="400" y="436" width="500" height="100" rx="6" fill="#dcfce7" stroke="#94a3b8"/>
<text x="650.0" y="478" class="cell"><tspan x="650.0" dy="0">2025约660GW</tspan></text>
<rect x="910" y="436" width="300" height="100" rx="6" fill="#fef3c7" stroke="#94a3b8"/>
<text x="1060.0" y="478" class="cell"><tspan x="1060.0" dy="0">现价重估约1,782亿元</tspan></text>
<rect x="1220" y="436" width="650" height="100" rx="6" fill="#fae8ff" stroke="#94a3b8"/>
<text x="1545.0" y="478" class="cell"><tspan x="1545.0" dy="0">制造量；每瓦毛利被总量放大</tspan></text>
<rect x="40" y="544" width="350" height="100" rx="6" fill="#e0f2fe" stroke="#94a3b8"/>
<text x="215.0" y="586" class="cell"><tspan x="215.0" dy="0">组件/辅材</tspan></text>
<rect x="400" y="544" width="500" height="100" rx="6" fill="#dcfce7" stroke="#94a3b8"/>
<text x="650.0" y="586" class="cell"><tspan x="650.0" dy="0">2025组件约620GW</tspan></text>
<rect x="910" y="544" width="300" height="100" rx="6" fill="#fef3c7" stroke="#94a3b8"/>
<text x="1060.0" y="586" class="cell"><tspan x="1060.0" dy="0">现价重估约4,514亿元</tspan></text>
<rect x="1220" y="544" width="650" height="100" rx="6" fill="#fae8ff" stroke="#94a3b8"/>
<text x="1545.0" y="586" class="cell"><tspan x="1545.0" dy="0">终端产品；金额已包含上游价值</tspan></text>
<rect x="40" y="652" width="350" height="100" rx="6" fill="#e0f2fe" stroke="#94a3b8"/>
<text x="215.0" y="694" class="cell"><tspan x="215.0" dy="0">制造设备</tspan></text>
<rect x="400" y="652" width="500" height="100" rx="6" fill="#dcfce7" stroke="#94a3b8"/>
<text x="650.0" y="694" class="cell"><tspan x="650.0" dy="0">由新增/改造产线决定</tspan></text>
<rect x="910" y="652" width="300" height="100" rx="6" fill="#fef3c7" stroke="#94a3b8"/>
<text x="1060.0" y="694" class="cell"><tspan x="1060.0" dy="0">晶盛+迈为相关收入约159亿元</tspan></text>
<rect x="1220" y="652" width="650" height="100" rx="6" fill="#fae8ff" stroke="#94a3b8"/>
<text x="1545.0" y="694" class="cell"><tspan x="1545.0" dy="0">订单晚于制造扩产，验收决定收入</tspan></text>
<rect x="40" y="760" width="350" height="100" rx="6" fill="#e0f2fe" stroke="#94a3b8"/>
<text x="215.0" y="802" class="cell"><tspan x="215.0" dy="0">逆变器</tspan></text>
<rect x="400" y="760" width="500" height="100" rx="6" fill="#dcfce7" stroke="#94a3b8"/>
<text x="650.0" y="802" class="cell"><tspan x="650.0" dy="0">阳光2025发货143GW</tspan></text>
<rect x="910" y="760" width="300" height="100" rx="6" fill="#fef3c7" stroke="#94a3b8"/>
<text x="1060.0" y="802" class="cell"><tspan x="1060.0" dy="0">分部收入311.36亿元</tspan></text>
<rect x="1220" y="760" width="650" height="100" rx="6" fill="#fae8ff" stroke="#94a3b8"/>
<text x="1545.0" y="802" class="cell"><tspan x="1545.0" dy="0">含产品结构差异，不是统一单瓦价</tspan></text>
<rect x="40" y="868" width="350" height="100" rx="6" fill="#e0f2fe" stroke="#94a3b8"/>
<text x="215.0" y="910" class="cell"><tspan x="215.0" dy="0">BOS/EPC</tspan></text>
<rect x="400" y="868" width="500" height="100" rx="6" fill="#dcfce7" stroke="#94a3b8"/>
<text x="650.0" y="910" class="cell"><tspan x="650.0" dy="0">2024集中式新增约159GW</tspan></text>
<rect x="910" y="868" width="300" height="100" rx="6" fill="#fef3c7" stroke="#94a3b8"/>
<text x="1060.0" y="910" class="cell"><tspan x="1060.0" dy="0">支架结构估算约360亿元</tspan></text>
<rect x="1220" y="868" width="650" height="100" rx="6" fill="#fae8ff" stroke="#94a3b8"/>
<text x="1545.0" y="910" class="cell"><tspan x="1545.0" dy="0">项目边界不同，金额误差较大</tspan></text>
<rect x="40" y="976" width="350" height="100" rx="6" fill="#e0f2fe" stroke="#94a3b8"/>
<text x="215.0" y="1018" class="cell"><tspan x="215.0" dy="0">开发运营/O&amp;M</tspan></text>
<rect x="400" y="976" width="500" height="100" rx="6" fill="#dcfce7" stroke="#94a3b8"/>
<text x="650.0" y="1018" class="cell"><tspan x="650.0" dy="0">中国累计约1,200GW</tspan></text>
<rect x="910" y="976" width="300" height="100" rx="6" fill="#fef3c7" stroke="#94a3b8"/>
<text x="1060.0" y="1018" class="cell"><tspan x="1060.0" dy="0">2025发电约1.17万亿kWh</tspan></text>
<rect x="1220" y="976" width="650" height="100" rx="6" fill="#fae8ff" stroke="#94a3b8"/>
<text x="1545.0" y="1018" class="cell"><tspan x="1545.0" dy="0">存量资产；收入还要乘实现电价</tspan></text>
</svg>