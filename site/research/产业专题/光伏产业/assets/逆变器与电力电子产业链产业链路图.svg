<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1040" viewBox="0 0 1800 1040">
<defs>
          <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#2563eb"/></marker>
          <marker id="money" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#c2410c"/></marker>
          <style>
            .title{font:700 43px 'Hiragino Sans GB','Arial Unicode MS',sans-serif;fill:#172033}
            .head{font:700 25px 'Hiragino Sans GB','Arial Unicode MS',sans-serif;fill:#172033;text-anchor:middle}
            .body{font:500 20px 'Hiragino Sans GB','Arial Unicode MS',sans-serif;fill:#334155;text-anchor:middle}
            .rev{font:600 18px 'Hiragino Sans GB','Arial Unicode MS',sans-serif;fill:#7c2d12;text-anchor:middle}
            .legend{font:600 21px 'Hiragino Sans GB','Arial Unicode MS',sans-serif;fill:#334155}
            .note{font:500 19px 'Hiragino Sans GB','Arial Unicode MS',sans-serif;fill:#475569;text-anchor:middle}
          </style>
        </defs>
<rect width="1800" height="1040" fill="#f8fafc"/>
<text x="900" y="70" class="title" text-anchor="middle">逆变器与电力电子：产品、认证与资金流</text>
<line x1="160" y1="175" x2="1640" y2="175" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow)"/>
<text x="900" y="150" class="legend" text-anchor="middle">蓝线：产品、设备、工程或电力向右交付</text>
<line x1="1640" y1="690" x2="160" y2="690" stroke="#c2410c" stroke-width="5" marker-end="url(#money)"/>
<text x="900" y="730" class="legend" text-anchor="middle">橙线：货款、工程款或电费沿合同向左回流；不是每一层都能留下利润</text>
<rect x="75" y="275" width="290" height="250" rx="8" fill="#e0f2fe" stroke="#64748b" stroke-width="2"/>
<text x="220.0" y="323" class="head"><tspan x="220.0" dy="0">电子元器件</tspan></text>
<text x="220.0" y="380" class="body"><tspan x="220.0" dy="0">功率器件、磁性件、电容、控制芯片</tspan></text>
<line x1="93" y1="441" x2="347" y2="441" stroke="#94a3b8"/>
<text x="220.0" y="473" class="rev"><tspan x="220.0" dy="0">元器件交付确认收入</tspan></text>
<line x1="370" y1="400" x2="396" y2="400" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow)"/>
<rect x="403" y="275" width="290" height="250" rx="8" fill="#dcfce7" stroke="#64748b" stroke-width="2"/>
<text x="548.0" y="323" class="head"><tspan x="548.0" dy="0">逆变器硬件</tspan></text>
<text x="548.0" y="380" class="body"><tspan x="548.0" dy="0">组串式、集中式、微型逆变器</tspan></text>
<line x1="421" y1="441" x2="675" y2="441" stroke="#94a3b8"/>
<text x="548.0" y="473" class="rev"><tspan x="548.0" dy="0">硬件交付确认收入</tspan></text>
<line x1="698" y1="400" x2="724" y2="400" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow)"/>
<rect x="731" y="275" width="290" height="250" rx="8" fill="#fef3c7" stroke="#64748b" stroke-width="2"/>
<text x="876.0" y="323" class="head"><tspan x="876.0" dy="0">控制与认证</tspan></text>
<text x="876.0" y="380" class="body"><tspan x="876.0" dy="0">并网算法、监控、各国认证</tspan></text>
<line x1="749" y1="441" x2="1003" y2="441" stroke="#94a3b8"/>
<text x="876.0" y="473" class="rev"><tspan x="876.0" dy="0">软件多随硬件，服务可持续收费</tspan></text>
<line x1="1026" y1="400" x2="1052" y2="400" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow)"/>
<rect x="1059" y="275" width="290" height="250" rx="8" fill="#fae8ff" stroke="#64748b" stroke-width="2"/>
<text x="1204.0" y="323" class="head"><tspan x="1204.0" dy="0">渠道与EPC</tspan></text>
<text x="1204.0" y="380" class="body"><tspan x="1204.0" dy="0">设计选型、安装和售后</tspan></text>
<line x1="1077" y1="441" x2="1331" y2="441" stroke="#94a3b8"/>
<text x="1204.0" y="473" class="rev"><tspan x="1204.0" dy="0">分销差价或工程服务收入</tspan></text>
<line x1="1354" y1="400" x2="1380" y2="400" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow)"/>
<rect x="1387" y="275" width="290" height="250" rx="8" fill="#fee2e2" stroke="#64748b" stroke-width="2"/>
<text x="1532.0" y="323" class="head"><tspan x="1532.0" dy="0">终端业主</tspan></text>
<text x="1532.0" y="380" class="body"><tspan x="1532.0" dy="0">为发电效率、安全和可用率付费</tspan></text>
<line x1="1405" y1="441" x2="1659" y2="441" stroke="#94a3b8"/>
<text x="1532.0" y="473" class="rev"><tspan x="1532.0" dy="0">售电或节省电费形成回报</tspan></text>
<rect x="105" y="790" width="600" height="145" rx="8" fill="#fff7ed" stroke="#c2410c" stroke-width="2"/>
<text x="405" y="835" class="head">最终付费方</text>
<text x="405" y="885" class="body"><tspan x="405" dy="0">电站业主、EPC、分销商或户用客户</tspan></text>
<rect x="1095" y="790" width="600" height="145" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="1395" y="835" class="head">客户最终买到的价值</text>
<text x="1395" y="885" class="body"><tspan x="1395" dy="0">把直流电安全高效变成电网可接纳的交流电</tspan></text>
<text x="900" y="995" class="note">读图顺序：先找最终付费方，再看合同交付和收入确认，最后判断直接成本、费用、回款与再投资后还剩多少现金。</text>
</svg>