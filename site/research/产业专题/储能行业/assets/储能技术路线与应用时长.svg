<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img">
<rect x="0" y="0" width="1500" height="900" fill="#f7f9fb"/>

<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8" />
  </marker>
  <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
    <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.08"/>
  </filter>
</defs>

<text x="60.0" y="70.0" font-size="36" font-weight="800" fill="#172033" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">技术路线与适用时长</text>
<text x="60.0" y="108.0" font-size="18" font-weight="400" fill="#667085" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">这张图帮助小白先分清：不同储能技术不是互相完全替代，而是在不同时间尺度上解决不同问题。</text>
<line x1="240" y1="720" x2="1320" y2="720" stroke="#475569" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="240.0" y1="705" x2="240.0" y2="735" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
<text x="240.0" y="765.0" font-size="17" font-weight="700" fill="#475569" text-anchor="middle" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">秒-分钟</text>
<line x1="600.476073850853" y1="705" x2="600.476073850853" y2="735" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
<text x="600.5" y="765.0" font-size="17" font-weight="700" fill="#475569" text-anchor="middle" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">1h</text>
<line x1="817.5042957474354" y1="705" x2="817.5042957474354" y2="735" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
