<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <rect width="1500" height="980" fill="#f8fafc"/>
  <style>
    .title { font: 800 34px "Arial Unicode MS", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #172033; }
    .sub { font: 500 16px "Arial Unicode MS", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #667085; }
    .head { font: 700 16px "Arial Unicode MS", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #172033; }
    .cell { font: 700 15px "Arial Unicode MS", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #172033; }
    .small { font: 500 13px "Arial Unicode MS", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #475467; }
  </style>
  <text x="70" y="70" class="title">储能产业链节点规模热力图</text>
  <text x="70" y="105" class="sub">数据核验：2026-06-26。颜色表示公开证据和利润质量的相对强弱；这是投研定位图，不是精确估值模型。</text>

  <rect x="70" y="135" width="1360" height="720" rx="10" fill="#ffffff" stroke="#d0d5dd"/>

  <text x="95" y="178" class="head">节点</text>
  <text x="330" y="178" class="head">物理规模</text>
  <text x="505" y="178" class="head">金额披露</text>
  <text x="680" y="178" class="head">利润质量</text>
  <text x="855" y="178" class="head">证据强度</text>
  <text x="1030" y="178" class="head">待补证重点</text>

  <line x1="70" y1="195" x2="1430" y2="195" stroke="#e4e7ec"/>

  <g transform="translate(0,0)">
    <rect x="70" y="195" width="1360" height="61" fill="#ffffff"/>
    <text x="95" y="232" class="cell">终端 BESS/项目建设</text>
    <rect x="330" y="211" width="120" height="30" rx="15" fill="#10b981"/><text x="390" y="231" text-anchor="middle" class="cell" fill="#ffffff">高</text>
    <rect x="505" y="211" width="120" height="30" rx="15" fill="#f59e0b"/><text x="565" y="231" text-anchor="middle" class="cell">中</text>
    <rect x="680" y="211" width="120" height="30" rx="15" fill="#f59e0b"/><text x="740" y="231" text-anchor="middle" class="cell">看机制</text>
    <rect x="855" y="211" width="120" height="30" rx="15" fill="#34d399"/><text x="915" y="231" text-anchor="middle" class="cell">A/B/C</text>
    <text x="1030" y="224" class="small">项目 IRR、利用小时、容量补偿</text>
    <line x1="70" y1="256" x2="1430" y2="256" stroke="#eef2f6"/>

    <rect x="70" y="256" width="1360" height="61" fill="#fbfdff"/>
    <text x="95" y="293" class="cell">电芯/储能电池系统</text>
    <rect x="330" y="272" width="120" height="30" rx="15" fill="#10b981"/><text x="390" y="292" text-anchor="middle" class="cell" fill="#ffffff">高</text>
    <rect x="505" y="272" width="120" height="30" rx="15" fill="#10b981"/><text x="565" y="292" text-anchor="middle" class="cell" fill="#ffffff">高</text>
    <rect x="680" y="272" width="120" height="30" rx="15" fill="#f59e0b"/><text x="740" y="292" text-anchor="middle" class="cell">中</text>
    <rect x="855" y="272" width="120" height="30" rx="15" fill="#10b981"/><text x="915" y="292" text-anchor="middle" class="cell" fill="#ffffff">A/B</text>
