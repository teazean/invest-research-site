<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <rect width="1500" height="980" fill="#f8fafc"/>
  <text x="60" y="72" font-family="PingFang SC, Arial, sans-serif" font-size="36" font-weight="700" fill="#172033">储能 ETF 入场信号灯</text>
  <text x="60" y="112" font-family="PingFang SC, Arial, sans-serif" font-size="18" fill="#5d6b7c">这张图不是交易指令，而是把行业基本面、估值、纯度、流动性和反证条件放在同一张检查表里。</text>

  <g font-family="PingFang SC, Arial, sans-serif">
    <rect x="70" y="155" width="1360" height="92" rx="12" fill="#ffffff" stroke="#d8e0ea"/>
    <circle cx="125" cy="201" r="24" fill="#22c55e"/>
    <text x="170" y="194" font-size="24" font-weight="700" fill="#172033">行业基本面：GREEN</text>
    <text x="170" y="224" font-size="18" fill="#475467">风光波动、电网灵活性、海外大储、数据中心负荷仍支撑长期需求。</text>

    <rect x="70" y="272" width="1360" height="92" rx="12" fill="#ffffff" stroke="#d8e0ea"/>
    <circle cx="125" cy="318" r="24" fill="#ef4444"/>
    <text x="170" y="311" font-size="24" font-weight="700" fill="#172033">估值位置：RED</text>
    <text x="170" y="341" font-size="18" fill="#475467">国证新能源电池 PB 近三年分位 93.94%；159566/159305 价格分位约 85%-89%。</text>

    <rect x="70" y="389" width="1360" height="92" rx="12" fill="#ffffff" stroke="#d8e0ea"/>
    <circle cx="125" cy="435" r="24" fill="#84cc16"/>
    <text x="170" y="428" font-size="24" font-weight="700" fill="#172033">持仓纯度：YELLOW-GREEN</text>
    <text x="170" y="458" font-size="18" fill="#475467">159566/159305 更贴近储能电池，但仍是股票篮子，不是直接买储能电站现金流。</text>

    <rect x="70" y="506" width="1360" height="92" rx="12" fill="#ffffff" stroke="#d8e0ea"/>
    <circle cx="125" cy="552" r="24" fill="#22c55e"/>
    <text x="170" y="545" font-size="24" font-weight="700" fill="#172033">交易流动性：GREEN</text>
    <text x="170" y="575" font-size="18" fill="#475467">159566 20 日均成交额约 4.45 亿元，159305 约 1.02 亿元；折溢价暂未显示明显压力。</text>

    <rect x="70" y="623" width="1360" height="92" rx="12" fill="#ffffff" stroke="#d8e0ea"/>
    <circle cx="125" cy="669" r="24" fill="#f59e0b"/>
    <text x="170" y="662" font-size="24" font-weight="700" fill="#172033">交易热度：YELLOW，拥挤度待核验</text>
    <text x="170" y="692" font-size="18" fill="#475467">价格分位高、成交活跃；资金拥挤还需份额变化、资金流和申赎数据确认。</text>

    <rect x="70" y="740" width="1360" height="92" rx="12" fill="#ffffff" stroke="#d8e0ea"/>
    <circle cx="125" cy="786" r="24" fill="#facc15"/>
    <text x="170" y="779" font-size="24" font-weight="700" fill="#172033">当前研究状态：观察偏等待</text>
    <text x="170" y="809" font-size="18" fill="#475467">行业值得跟踪，但更好的分批研究条件是估值回落、盈利验证、项目收益机制兑现和交易热度降温。</text>

    <rect x="70" y="857" width="1360" height="76" rx="12" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="100" y="892" font-size="22" font-weight="700" fill="#9a3412">反证条件</text>
    <text x="235" y="892" font-size="18" fill="#1f2937">如果容量机制落地慢、利用小时低、头部公司毛利和现金流恶化、ETF 估值高位且资金流确认拥挤，风险权重要上调。</text>
  </g>
</svg>
