<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920" role="img">
<rect x="0" y="0" width="1500" height="920" fill="#f7f9fb"/>

    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3"
              orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8" />
      </marker>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.08"/>
      </filter>
    </defs>
    
<text x="60.0" y="70.0" font-size="36" font-weight="800" fill="#22313f" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"><tspan x="60.0" dy="0">储能价值流与收益栈</tspan></text>
<text x="60.0" y="108.0" font-size="18" font-weight="400" fill="#667085" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"><tspan x="60.0" dy="0">硬件卖出去只是第一层，真正的高质量收益来自“被调用、会交易、能运维”。</tspan></text>
<rect x="105.0" y="190.0" width="235.0" height="410.0" rx="16" fill="#ffffff" stroke="#2563eb" stroke-width="1.6"/>
<rect x="105.0" y="190.0" width="235.0" height="60.0" rx="16" fill="#2563eb" stroke="#2563eb" stroke-width="1.2"/>
<text x="222.0" y="228.0" font-size="19" font-weight="800" fill="#ffffff" text-anchor="middle" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"><tspan x="222.0" dy="0">一次性硬件收入</tspan></text>
<text x="127.0" y="290.0" font-size="17" font-weight="600" fill="#22313f" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"><tspan x="127.0" dy="0">电芯、PCS、柜体、系统集成</tspan></text>
<line x1="340.0" y1="405.0" x2="370.0" y2="413.0" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="370.0" y="210.0" width="235.0" height="382.0" rx="16" fill="#ffffff" stroke="#16a34a" stroke-width="1.6"/>
<rect x="370.0" y="210.0" width="235.0" height="60.0" rx="16" fill="#16a34a" stroke="#16a34a" stroke-width="1.2"/>
<text x="487.0" y="248.0" font-size="19" font-weight="800" fill="#ffffff" text-anchor="middle" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"><tspan x="487.0" dy="0">工程交付收入</tspan></text>
<text x="392.0" y="310.0" font-size="17" font-weight="600" fill="#22313f" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"><tspan x="392.0" dy="0">设计、并网、EPC、调试</tspan></text>
<line x1="605.0" y1="413.0" x2="635.0" y2="421.0" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="635.0" y="230.0" width="235.0" height="354.0" rx="16" fill="#ffffff" stroke="#d97706" stroke-width="1.6"/>
<rect x="635.0" y="230.0" width="235.0" height="60.0" rx="16" fill="#d97706" stroke="#d97706" stroke-width="1.2"/>
<text x="752.0" y="268.0" font-size="19" font-weight="800" fill="#ffffff" text-anchor="middle" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"><tspan x="752.0" dy="0">长期运维收入</tspan></text>
<text x="657.0" y="330.0" font-size="17" font-weight="600" fill="#22313f" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"><tspan x="657.0" dy="0">质保、巡检、故障处理、容量保持</tspan></text>
<line x1="870.0" y1="421.0" x2="900.0" y2="429.0" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="900.0" y="250.0" width="235.0" height="326.0" rx="16" fill="#ffffff" stroke="#7c3aed" stroke-width="1.6"/>
<rect x="900.0" y="250.0" width="235.0" height="60.0" rx="16" fill="#7c3aed" stroke="#7c3aed" stroke-width="1.2"/>
<text x="1017.0" y="288.0" font-size="19" font-weight="800" fill="#ffffff" text-anchor="middle" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"><tspan x="1017.0" dy="0">调度软件收入</tspan></text>
<text x="922.0" y="350.0" font-size="17" font-weight="600" fill="#22313f" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"><tspan x="922.0" dy="0">EMS、预测、报价、Autobidder/Mosaic/GEMS</tspan></text>
<line x1="1135.0" y1="429.0" x2="1165.0" y2="437.0" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="1165.0" y="270.0" width="235.0" height="298.0" rx="16" fill="#ffffff" stroke="#dc2626" stroke-width="1.6"/>
<rect x="1165.0" y="270.0" width="235.0" height="60.0" rx="16" fill="#dc2626" stroke="#dc2626" stroke-width="1.2"/>
<text x="1282.0" y="308.0" font-size="19" font-weight="800" fill="#ffffff" text-anchor="middle" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"><tspan x="1282.0" dy="0">资产运营收益</tspan></text>
<text x="1187.0" y="370.0" font-size="17" font-weight="600" fill="#22313f" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"><tspan x="1187.0" dy="0">现货价差、辅助服务、容量补偿、虚拟电厂</tspan></text>
<rect x="100.0" y="690.0" width="1280.0" height="115.0" rx="16" fill="#eef6ff" stroke="#bfdbfe" stroke-width="1.2"/>
<text x="135.0" y="732.0" font-size="25" font-weight="800" fill="#2563eb" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"><tspan x="135.0" dy="0">判断口径</tspan></text>
<text x="135.0" y="773.0" font-size="20" font-weight="600" fill="#22313f" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"><tspan x="135.0" dy="0">如果收入只停留在前两层，企业更像制造/EPC；如果能进入后三层，才更接近“储能资产运营商/电力软件商”，估值逻辑也会变化。</tspan></text>
</svg>
