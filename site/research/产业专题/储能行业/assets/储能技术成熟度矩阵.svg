<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <rect width="1600" height="980" fill="#f7f4ed"/>
  <text x="70" y="78" font-size="42" font-weight="800" fill="#21313c" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">储能技术成熟度矩阵：哪些能赚钱，哪些还是期权</text>
  <text x="70" y="118" font-size="19" fill="#53616b" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">写作日期：2026-06-21。颜色表示当前商业化成熟度，不表示投资建议；具体结论需结合成本、毛利、订单、现金流和反证。</text>

  <g font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">
    <rect x="70" y="155" width="230" height="62" rx="8" fill="#21313c"/>
    <rect x="300" y="155" width="260" height="62" rx="8" fill="#21313c"/>
    <rect x="560" y="155" width="270" height="62" rx="8" fill="#21313c"/>
    <rect x="830" y="155" width="270" height="62" rx="8" fill="#21313c"/>
    <rect x="1100" y="155" width="210" height="62" rx="8" fill="#21313c"/>
    <rect x="1310" y="155" width="220" height="62" rx="8" fill="#21313c"/>
    <text x="90" y="194" font-size="21" font-weight="700" fill="#ffffff">环节/路线</text>
    <text x="320" y="194" font-size="21" font-weight="700" fill="#ffffff">成熟度</text>
    <text x="580" y="194" font-size="21" font-weight="700" fill="#ffffff">1-3 年方向</text>
    <text x="850" y="194" font-size="21" font-weight="700" fill="#ffffff">主要瓶颈</text>
    <text x="1120" y="194" font-size="21" font-weight="700" fill="#ffffff">投资读法</text>
    <text x="1330" y="194" font-size="21" font-weight="700" fill="#ffffff">反证</text>

    <g font-size="18" fill="#25333d">
      <rect x="70" y="217" width="1460" height="70" fill="#fffdf7" stroke="#d9d2c5"/>
      <rect x="300" y="227" width="186" height="36" rx="18" fill="#2f9e44"/>
      <text x="90" y="258" font-size="20" font-weight="700">LFP 电池储能</text>
      <text x="322" y="251" font-weight="700" fill="#ffffff">大规模商业化</text>
      <text x="580" y="246">大电芯、长寿命、系统集成、降本</text>
      <text x="850" y="246">价格战、安全、质保、产能周期</text>
      <text x="1120" y="246">看毛利和现金流</text>
      <text x="1330" y="246">ASP 跌快于成本</text>

      <rect x="70" y="287" width="1460" height="70" fill="#ffffff" stroke="#d9d2c5"/>
      <rect x="300" y="297" width="162" height="36" rx="18" fill="#74b816"/>
      <text x="90" y="328" font-size="20" font-weight="700">Pack/电池舱</text>
      <text x="322" y="321" font-weight="700" fill="#ffffff">成熟但分化</text>
      <text x="580" y="316">液冷、高安全、一体化、低辅耗</text>
      <text x="850" y="316">同质化、事故责任、低价中标</text>
      <text x="1120" y="316">看故障和质保</text>
      <text x="1330" y="316">事故率上升</text>

      <rect x="70" y="357" width="1460" height="70" fill="#fffdf7" stroke="#d9d2c5"/>
      <rect x="300" y="367" width="188" height="36" rx="18" fill="#74b816"/>
      <text x="90" y="398" font-size="20" font-weight="700">BMS</text>
      <text x="322" y="391" font-weight="700" fill="#ffffff">成熟，算法迭代</text>
      <text x="580" y="386">SOH/SOC、故障预警、寿命优化</text>
      <text x="850" y="386">数据质量、算法泛化、一致性</text>
      <text x="1120" y="386">看是否降事故</text>
      <text x="1330" y="386">不能降低运维成本</text>

      <rect x="70" y="427" width="1460" height="70" fill="#ffffff" stroke="#d9d2c5"/>
      <rect x="300" y="437" width="168" height="36" rx="18" fill="#f08c00"/>
      <text x="90" y="468" font-size="20" font-weight="700">PCS/构网控制</text>
      <text x="322" y="461" font-weight="700" fill="#ffffff">快速验证期</text>
      <text x="580" y="456">弱电网、频率/电压支撑、黑启动</text>
      <text x="850" y="456">标准分散、实测数据不足</text>
      <text x="1120" y="456">看招标和验收</text>
      <text x="1330" y="456">未形成溢价</text>

      <rect x="70" y="497" width="1460" height="70" fill="#fffdf7" stroke="#d9d2c5"/>
      <rect x="300" y="507" width="122" height="36" rx="18" fill="#f08c00"/>
      <text x="90" y="538" font-size="20" font-weight="700">EMS/交易优化</text>
      <text x="322" y="531" font-weight="700" fill="#ffffff">成长期</text>
      <text x="580" y="526">调度、预测、交易、虚拟电厂</text>
      <text x="850" y="526">能否独立收费、规则开放度</text>
      <text x="1120" y="526">看 ARR/分成</text>
      <text x="1330" y="526">只是硬件赠品</text>

      <rect x="70" y="567" width="1460" height="70" fill="#ffffff" stroke="#d9d2c5"/>
      <rect x="300" y="577" width="122" height="36" rx="18" fill="#f08c00"/>
      <text x="90" y="608" font-size="20" font-weight="700">运维/可用率服务</text>
      <text x="322" y="601" font-weight="700" fill="#ffffff">成长期</text>
      <text x="580" y="596">远程诊断、质保、长协、备件网络</text>
      <text x="850" y="596">服务响应、数据闭环、合同责任</text>
      <text x="1120" y="596">看可用率长协</text>
      <text x="1330" y="596">质保成本上升</text>

      <rect x="70" y="637" width="1460" height="70" fill="#fffdf7" stroke="#d9d2c5"/>
      <rect x="300" y="647" width="168" height="36" rx="18" fill="#d9480f"/>
      <text x="90" y="678" font-size="20" font-weight="700">钠离子电池</text>
      <text x="322" y="671" font-weight="700" fill="#ffffff">早期商业化</text>
      <text x="580" y="666">示范到小批量，验证成本和寿命</text>
      <text x="850" y="666">一致性、供应链、融资认可</text>
      <text x="1120" y="666">看订单验证</text>
      <text x="1330" y="666">成本优势不明显</text>

      <rect x="70" y="707" width="1460" height="70" fill="#ffffff" stroke="#d9d2c5"/>
      <rect x="300" y="717" width="216" height="36" rx="18" fill="#d9480f"/>
      <text x="90" y="748" font-size="20" font-weight="700">液流/压缩空气</text>
      <text x="322" y="741" font-weight="700" fill="#ffffff">示范到商业化初期</text>
      <text x="580" y="736">4 小时以上、长时容量、LCOS</text>
      <text x="850" y="736">成本、选址、系统复杂度</text>
      <text x="1120" y="736">看运行数据</text>
      <text x="1330" y="736">复制慢、融资弱</text>

      <rect x="70" y="777" width="1460" height="70" fill="#fffdf7" stroke="#d9d2c5"/>
      <rect x="300" y="787" width="144" height="36" rx="18" fill="#c92a2a"/>
      <text x="90" y="818" font-size="20" font-weight="700">铁空气/氢储能</text>
      <text x="322" y="811" font-weight="700" fill="#ffffff">远期期权</text>
      <text x="580" y="806">跨日/季节级调节，特定场景验证</text>
      <text x="850" y="806">效率、成本、基础设施、项目融资</text>
      <text x="1120" y="806">不计近期利润</text>
      <text x="1330" y="806">示范延期</text>
    </g>

    <g font-size="18" fill="#25333d">
      <rect x="70" y="880" width="28" height="18" fill="#2f9e44"/><text x="108" y="895">已大规模商业化：看成本、毛利、现金流</text>
      <rect x="440" y="880" width="28" height="18" fill="#f08c00"/><text x="478" y="895">验证/成长阶段：看项目验收和收费能力</text>
      <rect x="850" y="880" width="28" height="18" fill="#d9480f"/><text x="888" y="895">早期商业化：看订单和运行数据</text>
      <rect x="1190" y="880" width="28" height="18" fill="#c92a2a"/><text x="1228" y="895">远期期权：不能提前当确定利润</text>
    </g>

    <text x="70" y="936" font-size="17" fill="#63707a">来源：IEA Global Energy Review 2026、IEA battery markets commentary、国家能源局 2026-04-17、DOE LDES 2024；详见《储能行业技术成熟度与发展趋势》事实核验表。</text>
  </g>
</svg>
