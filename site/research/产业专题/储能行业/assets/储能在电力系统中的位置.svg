<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img">
<rect x="0" y="0" width="1400" height="780" fill="#f7f9fb"/>

    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3"
              orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8" />
      </marker>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.08"/>
      </filter>
    </defs>
    
<text x="60.0" y="70.0" font-size="36" font-weight="800" fill="#22313f" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"><tspan x="60.0" dy="0">储能在电力系统中的位置</tspan></text>
<text x="60.0" y="108.0" font-size="18" font-weight="400" fill="#667085" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"><tspan x="60.0" dy="0">它不是发电厂，而是把“发电时间”和“用电时间”重新对齐的可调度缓冲层。</tspan></text>
<g filter="url(#shadow)"><rect x="80.0" y="250.0" width="250.0" height="130.0" rx="14" fill="#ffffff" stroke="#d8dee8" stroke-width="1.2"/></g><rect x="80.0" y="250.0" width="8" height="130.0" rx="4" fill="#16a34a"/><text x="102.0" y="284.0" font-size="25" font-weight="700" fill="#16a34a" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"><tspan x="102.0" dy="0">光伏 / 风电</tspan></text><text x="102.0" y="320.0" font-size="17" font-weight="400" fill="#667085" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"><tspan x="102.0" dy="0">波动发电</tspan></text>
<g filter="url(#shadow)"><rect x="80.0" y="455.0" width="250.0" height="130.0" rx="14" fill="#ffffff" stroke="#d8dee8" stroke-width="1.2"/></g><rect x="80.0" y="455.0" width="8" height="130.0" rx="4" fill="#475569"/><text x="102.0" y="489.0" font-size="25" font-weight="700" fill="#475569" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"><tspan x="102.0" dy="0">煤电 / 气电 / 水电</tspan></text><text x="102.0" y="525.0" font-size="17" font-weight="400" fill="#667085" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"><tspan x="102.0" dy="0">传统调节资源</tspan></text>
<g filter="url(#shadow)"><rect x="560.0" y="340.0" width="280.0" height="170.0" rx="14" fill="#ffffff" stroke="#d8dee8" stroke-width="1.2"/></g><rect x="560.0" y="340.0" width="8" height="170.0" rx="4" fill="#2563eb"/><text x="582.0" y="374.0" font-size="25" font-weight="700" fill="#2563eb" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"><tspan x="582.0" dy="0">电网</tspan></text><text x="582.0" y="410.0" font-size="17" font-weight="400" fill="#667085" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"><tspan x="582.0" dy="0">实时平衡频率、电压、潮流</tspan></text>
<g filter="url(#shadow)"><rect x="560.0" y="130.0" width="280.0" height="145.0" rx="14" fill="#ffffff" stroke="#d8dee8" stroke-width="1.2"/></g><rect x="560.0" y="130.0" width="8" height="145.0" rx="4" fill="#7c3aed"/><text x="582.0" y="164.0" font-size="25" font-weight="700" fill="#7c3aed" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"><tspan x="582.0" dy="0">储能</tspan></text><text x="582.0" y="200.0" font-size="17" font-weight="400" fill="#667085" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"><tspan x="582.0" dy="0">充电、放电、调频、构网</tspan></text>
<g filter="url(#shadow)"><rect x="1060.0" y="250.0" width="260.0" height="130.0" rx="14" fill="#ffffff" stroke="#d8dee8" stroke-width="1.2"/></g><rect x="1060.0" y="250.0" width="8" height="130.0" rx="4" fill="#d97706"/><text x="1082.0" y="284.0" font-size="25" font-weight="700" fill="#d97706" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"><tspan x="1082.0" dy="0">工业 / 居民 / 数据中心</tspan></text><text x="1082.0" y="320.0" font-size="17" font-weight="400" fill="#667085" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"><tspan x="1082.0" dy="0">用电负荷</tspan></text>
<g filter="url(#shadow)"><rect x="1060.0" y="455.0" width="260.0" height="130.0" rx="14" fill="#ffffff" stroke="#d8dee8" stroke-width="1.2"/></g><rect x="1060.0" y="455.0" width="8" height="130.0" rx="4" fill="#0891b2"/><text x="1082.0" y="489.0" font-size="25" font-weight="700" fill="#0891b2" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"><tspan x="1082.0" dy="0">电力市场</tspan></text><text x="1082.0" y="525.0" font-size="17" font-weight="400" fill="#667085" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"><tspan x="1082.0" dy="0">现货、辅助服务、容量</tspan></text>
<line x1="330.0" y1="315.0" x2="560.0" y2="405.0" stroke="#16a34a" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="330.0" y1="520.0" x2="560.0" y2="445.0" stroke="#475569" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="700.0" y1="275.0" x2="700.0" y2="340.0" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="840.0" y1="420.0" x2="1060.0" y2="315.0" stroke="#d97706" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="840.0" y1="445.0" x2="1060.0" y2="520.0" stroke="#0891b2" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="1190.0" y1="455.0" x2="820.0" y2="275.0" stroke="#0891b2" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
<text x="470.0" y="660.0" font-size="20" font-weight="700" fill="#22313f" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"><tspan x="470.0" dy="0">读图：新能源占比越高，电网越需要“快速响应 + 可调容量 +</tspan><tspan x="470.0" dy="27">稳定支撑”。储能的价值取决于调用和市场机制。</tspan></text>
</svg>
