<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="760" viewBox="0 0 1500 760" role="img">
<rect x="0" y="0" width="1500" height="760" fill="#f7f9fb"/>

<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8" />
  </marker>
  <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
    <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.08"/>
  </filter>
</defs>

<text x="60.0" y="70.0" font-size="36" font-weight="800" fill="#172033" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">小白总入口：先看懂储能怎么赚钱</text>
<text x="60.0" y="108.0" font-size="18" font-weight="400" fill="#667085" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">读这张图就够开始：储能不是发电公司，而是电力系统的时间搬运工和稳定器。</text>
<g filter="url(#shadow)"><rect x="65" y="195" width="245" height="160" rx="12" fill="#ffffff" stroke="#d9e2ef" stroke-width="1.2"/></g>
<rect x="65" y="195" width="8" height="160" rx="4" fill="#2563eb"/>
<text x="89.0" y="230.0" font-size="22" font-weight="800" fill="#2563eb" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">1. 它在哪</text>
<text x="89.0" y="267.0" font-size="16" font-weight="500" fill="#667085" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">电网需要实时平衡</text>
<text x="89.0" y="290.0" font-size="16" font-weight="500" fill="#667085" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">储能负责把电搬时间</text>
<line x1="310" y1="275" x2="350" y2="275" stroke="#475569" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<g filter="url(#shadow)"><rect x="350" y="195" width="245" height="160" rx="12" fill="#ffffff" stroke="#d9e2ef" stroke-width="1.2"/></g>
<rect x="350" y="195" width="8" height="160" rx="4" fill="#16a34a"/>
<text x="374.0" y="230.0" font-size="22" font-weight="800" fill="#16a34a" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">2. 谁买单</text>
<text x="374.0" y="267.0" font-size="16" font-weight="500" fill="#667085" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">电网/发电集团/工厂</text>
<text x="374.0" y="290.0" font-size="16" font-weight="500" fill="#667085" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">数据中心/海外公用事业</text>
<line x1="595" y1="275" x2="635" y2="275" stroke="#475569" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<g filter="url(#shadow)"><rect x="635" y="195" width="245" height="160" rx="12" fill="#ffffff" stroke="#d9e2ef" stroke-width="1.2"/></g>
<rect x="635" y="195" width="8" height="160" rx="4" fill="#d97706"/>
<text x="659.0" y="230.0" font-size="22" font-weight="800" fill="#d97706" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">3. 钱从哪来</text>
<text x="659.0" y="267.0" font-size="16" font-weight="500" fill="#667085" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">价差、容量补偿</text>
<text x="659.0" y="290.0" font-size="16" font-weight="500" fill="#667085" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">辅助服务、可靠性</text>
<line x1="880" y1="275" x2="920" y2="275" stroke="#475569" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<g filter="url(#shadow)"><rect x="920" y="195" width="245" height="160" rx="12" fill="#ffffff" stroke="#d9e2ef" stroke-width="1.2"/></g>
<rect x="920" y="195" width="8" height="160" rx="4" fill="#7c3aed"/>
<text x="944.0" y="230.0" font-size="22" font-weight="800" fill="#7c3aed" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">4. 谁留利润</text>
<text x="944.0" y="267.0" font-size="16" font-weight="500" fill="#667085" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">电芯、PCS/构网</text>
<text x="944.0" y="290.0" font-size="16" font-weight="500" fill="#667085" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">EMS、可融资品牌</text>
<line x1="1165" y1="275" x2="1205" y2="275" stroke="#475569" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<g filter="url(#shadow)"><rect x="1205" y="195" width="245" height="160" rx="12" fill="#ffffff" stroke="#d9e2ef" stroke-width="1.2"/></g>
<rect x="1205" y="195" width="8" height="160" rx="4" fill="#dc2626"/>
<text x="1229.0" y="230.0" font-size="22" font-weight="800" fill="#dc2626" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">5. 怎么证伪</text>
<text x="1229.0" y="267.0" font-size="16" font-weight="500" fill="#667085" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">利用小时低、补偿慢</text>
<text x="1229.0" y="290.0" font-size="16" font-weight="500" fill="#667085" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">价格跌、现金流差</text>
<rect x="110" y="440" width="1280" height="155" rx="14" fill="#ffffff" stroke="#d9e2ef" stroke-width="1.2"/>
<text x="145.0" y="485.0" font-size="26" font-weight="800" fill="#172033" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">投资阅读顺序</text>
<text x="145.0" y="530.0" font-size="21" font-weight="600" fill="#172033" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">先问“谁需要储能”，再问“谁愿意付钱”，然后看“收入能否覆盖成本和融资”，最后才比较公司。这样可以避免把装机增长直接误读成所</text>
<text x="145.0" y="561.0" font-size="21" font-weight="600" fill="#172033" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">有储能公司都赚钱。</text>
<text x="90.0" y="690.0" font-size="20" font-weight="700" fill="#667085" text-anchor="start" font-family="Arial Unicode MS, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">这张图是阅读入口；后面的总览、国内、全球、公司表分别展开每一环。</text>
</svg>
