  <text x="800.0" y="48" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',Arial,sans-serif" font-size="30" font-weight="700" fill="#172033"><tspan x="800.0" dy="0">光伏价值流与利润敏感性</tspan></text>
