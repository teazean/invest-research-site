name: Publish research to public site

on:
  push:
    branches:
      - master
    paths:
      - '投资研究/公司研究/**'
      - '投资研究/产业专题/**'
      - '.github/workflows/publish-research.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-research
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out private vault
        uses: actions/checkout@v5
        with:
          path: vault
      - name: Check out public site
        uses: actions/checkout@v5
        with:
          repository: teazean/invest-research-site
          ref: main
          path: site-repo
          fetch-depth: 0
          ssh-key: ${{ secrets.SITE_DEPLOY_KEY }}
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: site-repo/package-lock.json
      - name: Install locked publisher dependencies
        working-directory: site-repo
        run: npm ci
      - name: Synchronize the allowlisted research corpus
        run: node site-repo/scripts/sync-content.mjs --source "$GITHUB_WORKSPACE/vault" --site-root "$GITHUB_WORKSPACE/site-repo/site"
      - name: Verify source copy and tests
        working-directory: site-repo
        run: |
          npm test
          npm run content:validate
          npm run site:build
          npm run site:verify
      - name: Commit and push changed public content
        working-directory: site-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/index.md site/catalog site/research site/public/research-manifest.json
          if git diff --cached --quiet; then
            echo "Public research content is already current."
            exit 0
          fi
          git commit -m "content: publish research from ${GITHUB_SHA}"
          git push origin HEAD:main

